<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 解题助手 - 演示</title>
    <!-- 可选：引入 KaTeX 用于数学公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page-title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .page-title p {
            opacity: 0.9;
            font-size: 16px;
        }

        /* AI Solver 容器会被插入到这里 */
    </style>
</head>
<body>
    <div class="page-title">
        <h1>AI 解题助手</h1>
        <p>支持 8 大厂商、流式输出、纯前端运行</p>
    </div>

    <!-- AI Solver 模块会自动创建 UI -->

    <!-- 引入 AI Solver 模块 -->
    <script src="ai-solver.js"></script>

    <script>
        // 可选：在 KaTeX 加载完成后配置公式渲染
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof renderMathInElement !== 'undefined') {
                // 监听答案区域的变化，自动渲染公式
                const observer = new MutationObserver(() => {
                    const answerDiv = document.getElementById('ai-solver-answer');
                    if (answerDiv) {
                        renderMathInElement(answerDiv, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false}
                            ],
                            throwOnError: false
                        });
                    }
                });

                // 观察答案区域
                setTimeout(() => {
                    const answerDiv = document.getElementById('ai-solver-answer');
                    if (answerDiv) {
                        observer.observe(answerDiv, { childList: true, subtree: true });
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
