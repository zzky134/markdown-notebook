    <script>
        // 应用程序主类
        class MarkdownNotebookApp {
            constructor() {
                this.notebooks = [];
                this.currentNoteId = null;
                this.currentNotebookId = null;
                this.searchQuery = '';
                this.cards = [];
                this.currentCardIndex = 0;
                this.debounceTimer = null;

                this.init();
            }

            init() {
                this.loadData();
                this.bindEvents();
                this.renderNotebookList();

                // 如果没有笔记本，创建一个默认的
                if (this.notebooks.length === 0) {
                    this.createDefaultData();
                }
            }

            // 创建默认数据
            createDefaultData() {
                const defaultNotebook = {
                    id: Date.now().toString(),
                    name: '默认笔记本',
                    notes: [{
                        id: (Date.now() + 1).toString(),
                        title: '欢迎使用 Markdown 笔记',
                        content: `# 欢迎使用 Markdown 笔记工具

这是一个简单易用的浏览器端笔记应用。

## 功能特点

- **左右分栏编辑**：左侧编写 Markdown，右侧实时预览
- **笔记管理**：支持多个笔记本和笔记
- **知识卡片**：使用特殊标记创建复习卡片
- **自动保存**：所有数据保存在浏览器本地

## 知识卡片示例

:front:: 什么是 Markdown？
:back:: Markdown 是一种轻量级标记语言，用简单的符号表示格式。

:front:: 如何创建代码块？
:back:: 使用三个反引号 \`\`\` 包裹代码，可指定语言实现语法高亮。

\`\`\`javascript
function hello() {
    console.log("Hello, World!");
}
\`\`\`

## 数学公式

支持 KaTeX 数学公式：

行内公式：$E = mc^2$

块级公式：
$$
\\sum_{i=1}^{n} x_i = x_1 + x_2 + \\cdots + x_n
$$

## 开始使用

点击左侧"新建笔记"按钮开始创建你的第一条笔记吧！`,
                        tags: ['入门', '示例'],
                        updatedAt: Date.now()
                    }]
                };

                this.notebooks.push(defaultNotebook);
                this.saveData();
                this.renderNotebookList();
            }

            // 绑定事件
            bindEvents() {
                // 编辑器输入事件
                const editor = document.getElementById('editor');
                editor.addEventListener('input', () => {
                    this.debounce(() => {
                        this.updatePreview();
                        this.saveCurrentNote();
                        this.updateStats();
                    }, 300);
                });

                // 标题输入事件
                const titleInput = document.getElementById('noteTitle');
                titleInput.addEventListener('input', () => {
                    this.debounce(() => {
                        this.saveCurrentNote();
                        this.renderNotebookList();
                    }, 300);
                });

                // 标签输入事件
                const tagInput = document.getElementById('tagInput');
                tagInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.addTag(tagInput.value.trim());
                        tagInput.value = '';
                    }
                });

                // 搜索事件
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', (e) => {
                    this.searchQuery = e.target.value.toLowerCase();
                    this.renderNotebookList();
                });

                // 点击外部关闭下拉菜单
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.dropdown')) {
                        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
                    }
                });

                // 保存按钮事件委托（因为按钮是动态显示的）
                document.addEventListener('click', (e) => {
                    const saveBtn = e.target.closest('#saveBtn');
                    if (saveBtn) {
                        e.preventDefault();
                        e.stopPropagation();
                        this.saveCurrentNote();
                    }
                });

                // 显示帮助提示
                setTimeout(() => {
                    const tooltip = document.getElementById('helpTooltip');
                    tooltip.classList.add('active');
                    setTimeout(() => {
                        tooltip.classList.remove('active');
                    }, 8000);
                }, 1000);
            }

            // 防抖函数
            debounce(fn, delay) {
                clearTimeout(this.debounceTimer);
                this.debounceTimer = setTimeout(fn, delay);
            }

            // 加载数据
            loadData() {
                try {
                    const data = localStorage.getItem('markdownNotebook');
                    if (data) {
                        this.notebooks = JSON.parse(data);
                    }
                } catch (e) {
                    console.error('加载数据失败:', e);
                    this.notebooks = [];
                }
            }

            // 保存数据
            saveData() {
                try {
                    localStorage.setItem('markdownNotebook', JSON.stringify(this.notebooks));
                } catch (e) {
                    console.error('保存数据失败:', e);
                    alert('保存失败，可能是存储空间不足');
                }
            }

            // 创建笔记本
            createNotebook() {
                document.getElementById('notebookModal').classList.add('active');
                document.getElementById('notebookNameInput').focus();
            }

            // 确认创建笔记本
            confirmCreateNotebook() {
                const name = document.getElementById('notebookNameInput').value.trim();
                if (!name) return;

                const notebook = {
                    id: Date.now().toString(),
                    name: name,
                    notes: []
                };

                this.notebooks.push(notebook);
                this.saveData();
                this.renderNotebookList();
                this.closeModal('notebookModal');
                document.getElementById('notebookNameInput').value = '';
            }

            // 创建笔记
            createNote(notebookId = null) {
                // 如果没有指定笔记本，使用当前选中的笔记本，如果没有则使用第一个
                if (!notebookId) {
                    if (this.currentNotebookId) {
                        notebookId = this.currentNotebookId;
                    } else if (this.notebooks.length > 0) {
                        notebookId = this.notebooks[0].id;
                    } else {
                        alert('请先创建笔记本');
                        return;
                    }
                }

                const notebook = this.notebooks.find(n => n.id === notebookId);
                if (!notebook) return;

                const note = {
                    id: Date.now().toString(),
                    title: '未命名笔记',
                    content: '',
                    tags: [],
                    updatedAt: Date.now()
                };

                notebook.notes.unshift(note);
                this.currentNotebookId = notebookId;
                this.currentNoteId = note.id;
                this.saveData();
                this.renderNotebookList();
                this.openNote(notebookId, note.id);
            }

            // 打开笔记
            openNote(notebookId, noteId) {
                this.currentNotebookId = notebookId;
                this.currentNoteId = noteId;

                const notebook = this.notebooks.find(n => n.id === notebookId);
                const note = notebook.notes.find(n => n.id === noteId);
                if (!note) return;

                // 显示编辑器
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('toolbar').style.display = 'flex';
                document.getElementById('editorPane').style.display = 'flex';
                document.getElementById('previewPane').style.display = 'flex';

                // 填充内容
                document.getElementById('noteTitle').value = note.title;
                document.getElementById('editor').value = note.content;

                // 渲染标签
                this.renderTags(note.tags);

                // 强制更新预览（使用setTimeout确保DOM已更新）
                setTimeout(() => {
                    this.updatePreview();
                    this.updateStats();
                }, 0);

                // 更新列表选中状态
                this.renderNotebookList();
            }

            // 保存当前笔记
            saveCurrentNote() {
                if (!this.currentNoteId || !this.currentNotebookId) {
                    console.log('保存失败：未选中笔记');
                    return;
                }

                const notebook = this.notebooks.find(n => n.id === this.currentNotebookId);
                const note = notebook.notes.find(n => n.id === this.currentNoteId);
                if (!note) {
                    console.log('保存失败：找不到笔记');
                    return;
                }

                note.title = document.getElementById('noteTitle').value || '未命名笔记';
                note.content = document.getElementById('editor').value;
                note.updatedAt = Date.now();

                this.saveData();
                this.showSaveFeedback();
                console.log('笔记已保存:', note.title);
            }

            // 显示保存成功反馈
            showSaveFeedback() {
                const btn = document.querySelector('.save-btn');
                if (!btn) return;

                const originalHTML = btn.innerHTML;
                btn.innerHTML = `
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    已保存
                `;
                btn.style.background = '#10b981';

                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                }, 1500);
            }

            // 删除笔记
            deleteNote(notebookId, noteId, event) {
                event.stopPropagation();
                if (!confirm('确定要删除这条笔记吗？')) return;

                const notebook = this.notebooks.find(n => n.id === notebookId);
                notebook.notes = notebook.notes.filter(n => n.id !== noteId);

                if (this.currentNoteId === noteId) {
                    this.closeEditor();
                }

                this.saveData();
                this.renderNotebookList();
            }

            // 关闭编辑器
            closeEditor() {
                this.currentNoteId = null;
                this.currentNotebookId = null;
                document.getElementById('emptyState').style.display = 'flex';
                document.getElementById('toolbar').style.display = 'none';
                document.getElementById('editorPane').style.display = 'none';
                document.getElementById('previewPane').style.display = 'none';
                this.renderNotebookList();
            }

            // 预处理数学公式，防止被marked解析
            protectMath(content) {
                const mathBlocks = [];
                const mathInline = [];

                // 保护块级公式 $$
                content = content.replace(/\$\$([\s\S]*?)\$\$/g, (match, formula) => {
                    mathBlocks.push(formula.trim());
                    return '\n\n___MATH_BLOCK_' + (mathBlocks.length - 1) + '___\n\n';
                });

                // 保护行内公式 $（但不匹配 $$）
                content = content.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, (match, formula) => {
                    mathInline.push(formula.trim());
                    return '___MATH_INLINE_' + (mathInline.length - 1) + '___';
                });

                return { content, mathBlocks, mathInline };
            }

            // 恢复数学公式并渲染
            restoreAndRenderMath(html, mathBlocks, mathInline) {
                // 恢复块级公式
                mathBlocks.forEach((formula, i) => {
                    const placeholder = '___MATH_BLOCK_' + i + '___';
                    // 使用字符串替换，避免正则表达式特殊字符问题
                    const placeholderRegex = placeholder.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    html = html.replace(
                        new RegExp('<p>?' + placeholderRegex + '</p>?', 'g'),
                        '<div class="math-block" data-formula="' + this.escapeHtml(formula) + '"></div>'
                    );
                });

                // 恢复行内公式
                mathInline.forEach((formula, i) => {
                    const placeholder = '___MATH_INLINE_' + i + '___';
                    // 使用字符串替换，避免正则表达式特殊字符问题
                    const placeholderRegex = placeholder.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    html = html.replace(
                        new RegExp(placeholderRegex, 'g'),
                        '<span class="math-inline" data-formula="' + this.escapeHtml(formula) + '"></span>'
                    );
                });

                return html;
            }

            // HTML转义
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 渲染数学公式
            renderMathWithKatex(element) {
                // 渲染块级公式
                element.querySelectorAll('.math-block').forEach(el => {
                    try {
                        const formula = el.getAttribute('data-formula');
                        katex.render(formula, el, {
                            throwOnError: false,
                            displayMode: true
                        });
                    } catch (e) {
                        console.error('块级公式渲染失败:', e);
                    }
                });

                // 渲染行内公式
                element.querySelectorAll('.math-inline').forEach(el => {
                    try {
                        const formula = el.getAttribute('data-formula');
                        katex.render(formula, el, {
                            throwOnError: false,
                            displayMode: false
                        });
                    } catch (e) {
                        console.error('行内公式渲染失败:', e);
                    }
                });
            }

            // 更新预览
            updatePreview() {
                const content = document.getElementById('editor').value;
                const preview = document.getElementById('preview');

                if (!content || !preview) return;

                try {
                    // 保护数学公式
                    const { content: protectedContent, mathBlocks, mathInline } = this.protectMath(content);

                    // 配置 marked
                    marked.setOptions({
                        highlight: function(code, lang) {
                            if (lang && Prism.languages[lang]) {
                                return Prism.highlight(code, Prism.languages[lang], lang);
                            }
                            return code;
                        },
                        breaks: true,
                        gfm: true
                    });

                    // 处理知识卡片标记
                    let processedContent = this.processCardMarkers(protectedContent);

                    // 渲染 Markdown
                    let html = marked.parse(processedContent);

                    // 恢复数学公式
                    html = this.restoreAndRenderMath(html, mathBlocks, mathInline);

                    preview.innerHTML = html;

                    // 高亮代码块
                    preview.querySelectorAll('pre code').forEach((block) => {
                        Prism.highlightElement(block);
                    });

                    // 使用KaTeX渲染数学公式
                    this.renderMathWithKatex(preview);
                } catch (e) {
                    console.error('预览渲染失败:', e);
                    preview.innerHTML = '<p style="color: #ef4444;">渲染失败，请检查Markdown语法</p>';
                }
            }

            // 处理知识卡片标记
            processCardMarkers(content) {
                // 先保护数学公式不被处理
                const mathBlocks = [];
                const mathInline = [];

                // 保护块级公式 $$
                content = content.replace(/\$\$([\s\S]*?)\$\$/g, (match) => {
                    mathBlocks.push(match);
                    return '___MATH_BLOCK_' + (mathBlocks.length - 1) + '___';
                });

                // 保护行内公式 $（但不匹配 $$）
                content = content.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, (match) => {
                    mathInline.push(match);
                    return '___MATH_INLINE_' + (mathInline.length - 1) + '___';
                });

                // 在预览中高亮显示卡片标记
                content = content.replace(/:front::(.*?)($|\n)/g, '<span class="knowledge-card-marker">🎴 问题:</span>$1$2');
                content = content.replace(/:back::(.*?)($|\n)/g, '<span class="knowledge-card-marker" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">💡 答案:</span>$1$2');

                // 恢复数学公式
                mathBlocks.forEach((math, i) => {
                    content = content.replace('___MATH_BLOCK_' + i + '___', math);
                });
                mathInline.forEach((math, i) => {
                    content = content.replace('___MATH_INLINE_' + i + '___', math);
                });

                return content;
            }

            // 渲染数学公式
            renderMath(element) {
                if (typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(element, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                }
            }

            // 统计笔记本中的卡片数量
            countNotebookCards(notes) {
                let count = 0;
                notes.forEach(note => {
                    const cards = this.extractCards(note.content);
                    count += cards.length;
                });
                return count;
            }

            // 提取知识卡片
            extractCards(content) {
                if (!content) return [];
                const cards = [];
                const cardRegex = /:front::(.*?)\n:back::(.*?)(?=\n:front::|\n\n|$)/gs;
                let match;

                while ((match = cardRegex.exec(content)) !== null) {
                    cards.push({
                        front: match[1].trim(),
                        back: match[2].trim()
                    });
                }

                return cards;
            }

            // 开始笔记本卡片复习
            startNotebookCardReview(notebookId, event) {
                event.stopPropagation();
                const notebook = this.notebooks.find(n => n.id === notebookId);
                if (!notebook) return;

                // 收集笔记本中所有笔记的卡片
                this.cards = [];
                notebook.notes.forEach(note => {
                    const noteCards = this.extractCards(note.content);
                    noteCards.forEach(card => {
                        this.cards.push({
                            ...card,
                            noteTitle: note.title
                        });
                    });
                });

                if (this.cards.length === 0) {
                    alert('该笔记本中没有找到知识卡片');
                    return;
                }

                this.currentCardIndex = 0;
                this.renderCard();
                document.getElementById('cardReviewModal').classList.add('active');
            }

            // 开始卡片复习
            startCardReview() {
                if (!this.currentNoteId) {
                    alert('请先打开一个笔记');
                    return;
                }

                const notebook = this.notebooks.find(n => n.id === this.currentNotebookId);
                const note = notebook.notes.find(n => n.id === this.currentNoteId);
                this.cards = this.extractCards(note.content).map(card => ({
                    ...card,
                    noteTitle: note.title
                }));

                if (this.cards.length === 0) {
                    alert('当前笔记中没有找到知识卡片\n\n使用 :front:: 问题和 :back:: 答案 的格式创建卡片');
                    return;
                }

                this.currentCardIndex = 0;
                this.renderCard();
                document.getElementById('cardReviewModal').classList.add('active');
            }

            // 关闭卡片复习
            closeCardReview() {
                document.getElementById('cardReviewModal').classList.remove('active');
            }

            // 渲染卡片
            renderCard() {
                const container = document.getElementById('cardContainer');
                const counter = document.getElementById('cardCounter');

                counter.textContent = `${this.currentCardIndex + 1} / ${this.cards.length}`;

                if (this.cards.length === 0) {
                    container.innerHTML = `
                        <div class="no-cards-message">
                            <h3>没有找到知识卡片</h3>
                            <p>在笔记中使用 :front:: 和 :back:: 标记创建卡片</p>
                        </div>
                    `;
                    return;
                }

                const card = this.cards[this.currentCardIndex];
                const showSource = card.noteTitle ? `<div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">来自: ${card.noteTitle}</div>` : '';
                container.innerHTML = `
                    <div class="flashcard" id="flashcard" onclick="app.flipCard()">
                        <div class="flashcard-inner">
                            <div class="flashcard-front">
                                <div class="card-label">问题</div>
                                ${showSource}
                                <div class="card-content">${card.front}</div>
                                <div class="card-hint">点击翻转查看答案</div>
                            </div>
                            <div class="flashcard-back">
                                <div class="card-label">答案</div>
                                <div class="card-content">${card.back}</div>
                                <div class="card-hint">点击翻回</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 删除重复的 renderNotebookCard，统一使用 renderCard

            // 翻转卡片
            flipCard() {
                const flashcard = document.getElementById('flashcard');
                flashcard.classList.toggle('flipped');
            }

            // 上一张卡片
            prevCard() {
                if (this.currentCardIndex > 0) {
                    this.currentCardIndex--;
                    this.renderCard();
                }
            }

            // 下一张卡片
            nextCard() {
                if (this.currentCardIndex < this.cards.length - 1) {
                    this.currentCardIndex++;
                    this.renderCard();
                }
            }

            // 渲染笔记本列表
            renderNotebookList() {
                const container = document.getElementById('notebookList');
                container.innerHTML = '';

                this.notebooks.forEach(notebook => {
                    // 过滤笔记
                    let notes = notebook.notes;
                    if (this.searchQuery) {
                        notes = notes.filter(note =>
                            note.title.toLowerCase().includes(this.searchQuery) ||
                            note.content.toLowerCase().includes(this.searchQuery) ||
                            note.tags.some(tag => tag.toLowerCase().includes(this.searchQuery))
                        );
                    }

                    if (this.searchQuery && notes.length === 0) return;

                    const notebookEl = document.createElement('div');
                    notebookEl.className = 'notebook-item';

            // 切换笔记本展开/收起
            toggleNotebook(notebookId) {
                const noteList = document.getElementById(`notebook-${notebookId}`);
                if (noteList) {
                    const isHidden = noteList.style.display === 'none';
                    noteList.style.display = isHidden ? 'block' : 'none';
                    // 更新当前笔记本ID
                    if (isHidden) {
                        this.currentNotebookId = notebookId;
                    } else if (this.currentNotebookId === notebookId) {
                        this.currentNotebookId = null;
                    }
                    this.renderNotebookList();
                }
            }

            // 渲染标签
            renderTags(tags) {
                const container = document.getElementById('tagsDisplay');
                container.innerHTML = tags.map(tag => `
                    <span class="tag">
                        ${tag}
                        <span class="remove-tag" onclick="app.removeTag('${tag}')">&times;</span>
                    </span>
                `).join('');
            }

            // 添加标签
            addTag(tag) {
                if (!tag || !this.currentNoteId) return;

                const notebook = this.notebooks.find(n => n.id === this.currentNotebookId);
                const note = notebook.notes.find(n => n.id === this.currentNoteId);

                if (!note.tags.includes(tag)) {
                    note.tags.push(tag);
                    this.renderTags(note.tags);
                    this.saveData();
                }
            }

            // 移除标签
            removeTag(tag) {
                if (!this.currentNoteId) return;

                const notebook = this.notebooks.find(n => n.id === this.currentNotebookId);
                const note = notebook.notes.find(n => n.id === this.currentNoteId);

                note.tags = note.tags.filter(t => t !== tag);
                this.renderTags(note.tags);
                this.saveData();
            }

            // 更新统计
            updateStats() {
                const content = document.getElementById('editor').value;
                const charCount = content.length;
                const wordCount = content.trim().split(/\s+/).filter(w => w.length > 0).length;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));

                document.getElementById('wordCount').textContent = `${charCount} 字`;
                document.getElementById('readTime').textContent = `${readTime} 分钟阅读`;
            }

            // 导出笔记
            exportNote(format) {
                if (!this.currentNoteId) {
                    alert('请先打开一个笔记');
                    return;
                }

                const notebook = this.notebooks.find(n => n.id === this.currentNotebookId);
                const note = notebook.notes.find(n => n.id === this.currentNoteId);

                if (format === 'md') {
                    // 导出为 Markdown
                    const blob = new Blob([note.content], { type: 'text/markdown' });
                    this.downloadFile(blob, `${note.title}.md`);
                } else if (format === 'html') {
                    // 导出为 HTML
                    const htmlContent = `<!DOCTYPE html>
<html>
<head>

    <title>${note.title}</title>

</body>

                    const blob = new Blob([htmlContent], { type: 'text/html' });
                    this.downloadFile(blob, `${note.title}.html`);
                } else if (format === 'image') {
                    // 导出为图片（移动端）
                    this.exportImageMobile(note);

            }

            // 导出为 PDF - 使用浏览器打印功能
            async exportToPDF(note) {

                // 桌面端：使用浏览器打印功能
                // 创建打印窗口
                const printWindow = window.open('', '_blank', 'width=800,height=600');
                if (!printWindow) {
                    alert('请允许弹出窗口以导出 PDF');

                // 渲染 Markdown 内容
                let htmlContent = '';
                try {
                    // 保护数学公式
                    const { content: protectedContent, mathBlocks, mathInline } = this.protectMath(content);

                    // 配置 marked
                    marked.setOptions({
                        highlight: function(code, lang) {
                            if (lang && Prism.languages[lang]) {
                                return Prism.highlight(code, Prism.languages[lang], lang);
                            }
                            return code;
                        },
                        breaks: true,
                        gfm: true
                    });

                    // 处理知识卡片标记
                    let processedContent = protectedContent.replace(/:front::(.*?)($|\n)/g, '<span class="knowledge-card-marker">问题:</span>$1$2');
                    processedContent = processedContent.replace(/:back::(.*?)($|\n)/g, '<span class="knowledge-card-marker" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">答案:</span>$1$2');

                    // 渲染 Markdown
                    htmlContent = marked.parse(processedContent);

                    // 恢复数学公式
                    htmlContent = this.restoreAndRenderMath(htmlContent, mathBlocks, mathInline);

                    console.error('Markdown 渲染失败:', e);

            // 移动端导出为图片
            async exportImageMobile(note, content) {
                // 检查 html2canvas 库
                if (typeof html2canvas === 'undefined') {
                    try {
                        await this.loadHtml2CanvasLibrary();
                    } catch (err) {
                        alert('图片库加载失败，请检查网络连接');
                        return;
                    }
                }

                // 显示加载提示
                const loadingDiv = document.createElement('div');
                loadingDiv.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0,0,0,0.7);
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    z-index: 10000;
                    color: white;
                    font-size: 16px;
                `;
                loadingDiv.innerHTML = `
                    <div style="margin-bottom: 20px;">正在生成图片...</div>
                    <div class="spinner" style="width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
                `;
                document.body.appendChild(loadingDiv);

                try {
                    // 临时切换到预览标签
                    const originalTab = this.mobileCurrentTab;
                    this.switchMobileTab('preview');
                    await new Promise(resolve => setTimeout(resolve, 500));

                    // 获取预览元素
                    const previewElement = document.getElementById('preview');
                    if (!previewElement) {
                        throw new Error('预览元素不存在');
                    }

                    // 创建一个包装容器
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = `
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100vw;
                        padding: 20px;
                        background: white;
                        z-index: -9999;
                    `;

                    // 添加标题
                    const titleHTML = `
                        <h1 style="font-size: 22px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; color: #1e293b; font-weight: 600;">
                            ${this.escapeHtml(note.title)}
                        </h1>
                    `;

                    // 克隆预览内容
                    const contentClone = previewElement.cloneNode(true);
                    contentClone.style.cssText = 'font-size: 14px; line-height: 1.8; color: #1e293b;';

                    wrapper.innerHTML = titleHTML;
                    wrapper.appendChild(contentClone);
                    document.body.appendChild(wrapper);

                    // 等待渲染
                    await new Promise(resolve => setTimeout(resolve, 300));

                    // 使用 html2canvas 捕获
                    const canvas = await html2canvas(wrapper, {
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: '#ffffff',
                        logging: false,
                        width: wrapper.scrollWidth,
                        height: wrapper.scrollHeight
                    });

                    // 转换为图片并下载
                    const imgData = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = imgData;
                    link.download = `${note.title}.png`;
                    link.click();

                    // 清理
                    if (wrapper.parentNode) {
                        wrapper.parentNode.removeChild(wrapper);
                    }

                    // 恢复原始标签
                    this.switchMobileTab(originalTab);

                    // 延迟移除加载提示
                    setTimeout(() => {
                        if (loadingDiv.parentNode) {
                            loadingDiv.parentNode.removeChild(loadingDiv);
                        }
                    }, 500);

                } catch (err) {
                    console.error('图片生成失败:', err);
                    alert('图片生成失败: ' + (err.message || '请重试'));
                    if (loadingDiv.parentNode) {
                        loadingDiv.parentNode.removeChild(loadingDiv);
                    }
                }
            }

            // 加载 html2canvas 库
            loadHtml2CanvasLibrary() {
                return new Promise((resolve, reject) => {
                    if (typeof html2canvas !== 'undefined') {
                        resolve();
                        return;
                    }
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                    script.onload = () => resolve();
                    script.onerror = () => reject(new Error('加载失败'));
                    document.head.appendChild(script);
                });
            }

            // 下载文件
            downloadFile(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            }

            // 切换下拉菜单
            toggleDropdown(id) {
                const dropdown = document.getElementById(id);
                dropdown.classList.toggle('active');
            }

            // 关闭模态框
            closeModal(id) {
                document.getElementById(id).classList.remove('active');
            }

            // ========== 模板库功能 ==========

            // 打开模板库
            openTemplateLibrary() {
                this.renderTemplateLibrary();
                document.getElementById('templateLibraryModal').classList.add('active');
            }

            // 渲染模板库
            renderTemplateLibrary() {
                const grid = document.getElementById('templateGrid');
                if (!grid || typeof markdownTemplates === 'undefined') return;

                grid.innerHTML = '';

                Object.values(markdownTemplates).forEach(template => {
                    const card = document.createElement('div');
                    card.className = 'template-card';
                    card.onclick = () => this.previewTemplate(template.id);

                    card.innerHTML = `
                        <div class="template-card-icon">${template.icon}</div>
                        <div class="template-card-name">${template.name}</div>
                        <div class="template-card-category">${template.category}</div>
                        <div class="template-card-desc">${template.description}</div>
                    `;

                    grid.appendChild(card);
                });
            }

            // 预览模板
            previewTemplate(templateId) {
                if (typeof markdownTemplates === 'undefined') return;

                const template = markdownTemplates[templateId];
                if (!template) return;

                this.selectedTemplateId = templateId;

                document.getElementById('previewTemplateTitle').textContent = `${template.icon} ${template.name}`;
                document.getElementById('templatePreviewContent').textContent = template.content;
                document.getElementById('templatePreviewModal').classList.add('active');
            }

            // 插入模板内容到编辑器
            insertTemplateContent() {
                if (!this.selectedTemplateId || typeof markdownTemplates === 'undefined') {
                    this.closeModal('templatePreviewModal');
                    return;
                }

                const template = markdownTemplates[this.selectedTemplateId];
                if (!template) {
                    this.closeModal('templatePreviewModal');
                    return;
                }

                // 如果没有打开的笔记，先创建一个新笔记
                if (!this.currentNoteId) {
                    this.createNote();
                }

                const editor = document.getElementById('editor');
                if (!editor) {
                    this.closeModal('templatePreviewModal');
                    return;
                }

                // 获取当前光标位置
                const cursorPos = editor.selectionStart;
                const textBefore = editor.value.substring(0, cursorPos);
                const textAfter = editor.value.substring(cursorPos);

                // 插入模板内容
                const content = template.content;
                editor.value = textBefore + content + textAfter;

                // 设置光标位置到插入内容的末尾
                const newCursorPos = cursorPos + content.length;
                editor.setSelectionRange(newCursorPos, newCursorPos);
                editor.focus();

                // 更新预览和保存
                this.updatePreview();
                this.saveCurrentNote();
                this.updateStats();

                // 关闭模态框
                this.closeModal('templatePreviewModal');
                this.closeModal('templateLibraryModal');

                // 显示成功提示
                this.showTemplateFeedback();
            }

            // 显示模板插入成功反馈
            showTemplateFeedback() {
                const tooltip = document.getElementById('helpTooltip');
                if (!tooltip) return;

                const originalHTML = tooltip.innerHTML;
                tooltip.innerHTML = `
                    <strong>模板已插入！</strong><br>
                    将【】中的内容替换为你自己的笔记
                `;
                tooltip.style.background = '#10b981';
                tooltip.classList.add('active');

                setTimeout(() => {
                    tooltip.innerHTML = originalHTML;
                    tooltip.style.background = '';
                    tooltip.classList.remove('active');
                }, 3000);
            }

            // 插入 AI 生成的知识卡片
            insertAICards(markdown) {
                if (!markdown || markdown.trim().length === 0) {
                    return;
                }

                // 如果没有打开的笔记，先创建一个新笔记
                if (!this.currentNoteId) {
                    this.createNote();
                }

                const editor = document.getElementById('editor');
                if (!editor) {
                    return;
                }

                // 获取当前光标位置
                const cursorPos = editor.selectionStart;
                const textBefore = editor.value.substring(0, cursorPos);
                const textAfter = editor.value.substring(cursorPos);

                // 准备插入内容（添加前后换行）
                const contentToInsert = '\n\n' + markdown.trim() + '\n\n';
                editor.value = textBefore + contentToInsert + textAfter;

                // 设置光标位置到插入内容的末尾
                const newCursorPos = cursorPos + contentToInsert.length;
                editor.setSelectionRange(newCursorPos, newCursorPos);
                editor.focus();

                // 更新预览和保存
                this.updatePreview();
                this.saveCurrentNote();
                this.updateStats();

                // 显示成功提示
                this.showAICardsFeedback();
            }

                }, 3000);
            }
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/markdown-notebook/sw.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }

        // 处理 PWA 安装提示
        let deferredPrompt;
        let isPWAInstalled = false;

        // 检测是否已作为 PWA 运行
        if (window.matchMedia('(display-mode: standalone)').matches ||
            window.navigator.standalone === true) {
            isPWAInstalled = true;
            console.log('当前已在 PWA 模式中运行');
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('PWA 可以安装 - beforeinstallprompt 事件触发');

            // 延迟显示安装按钮，确保 DOM 已加载
            setTimeout(() => {
                const installBtn = document.getElementById('pwaInstallBtn');
                if (installBtn && !isPWAInstalled) {
                    installBtn.style.display = 'flex';
                    console.log('安装按钮已显示');
                }
            }, 1000);
        });

        // PWA 安装函数
        async function installPWA() {
            console.log('尝试安装 PWA, deferredPrompt:', deferredPrompt);

            if (!deferredPrompt) {
                // 检查是否满足安装条件
                const manifestLink = document.querySelector('link[rel="manifest"]');
                const swSupported = 'serviceWorker' in navigator;

                let message = '暂无法安装。\n';
                if (!manifestLink) message += '- 缺少 manifest 文件\n';
                if (!swSupported) message += '- 浏览器不支持 Service Worker\n';
                if (window.location.protocol !== 'https:') message += '- 需要使用 HTTPS\n';

                alert(message + '\n请尝试刷新页面，或使用 Chrome/Edge/Safari 浏览器。');
                return;
            }

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('用户选择:', outcome);
            deferredPrompt = null;

            const installBtn = document.getElementById('pwaInstallBtn');
            if (installBtn) {
                installBtn.style.display = 'none';
            }

            if (outcome === 'accepted') {
                alert('应用正在安装，请稍候...');
            }
        }

        // 检测 PWA 是否已安装
        window.addEventListener('appinstalled', () => {
            console.log('PWA 已安装');
            deferredPrompt = null;
            const installBtn = document.getElementById('pwaInstallBtn');
            if (installBtn) {
                installBtn.style.display = 'none';
            }
        });

        // 初始化应用
        const app = new MarkdownNotebookApp();

        // PWA 调试信息（开发调试用）
        window.addEventListener('load', () => {
            setTimeout(() => {
                const debugInfo = {
                    'User Agent': navigator.userAgent.substring(0, 50) + '...',
                    'Display Mode': window.matchMedia('(display-mode: standalone)').matches ? 'standalone' : 'browser',
                    'Service Worker': 'serviceWorker' in navigator ? 'supported' : 'not supported',
                    'HTTPS': window.location.protocol === 'https:' ? 'yes' : 'no',
                    'Manifest': document.querySelector('link[rel="manifest"]') ? 'found' : 'missing',
                    'BeforeInstallPrompt': typeof deferredPrompt !== 'undefined' ? 'captured' : 'not captured'
                };
                console.log('=== PWA Debug Info ===');
                Object.entries(debugInfo).forEach(([key, value]) => {
                    console.log(`${key}: ${value}`);
                });
                console.log('=====================');
            }, 2000);
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + S 保存
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                app.saveCurrentNote();
            }

            // ESC 关闭卡片复习
            if (e.key === 'Escape') {
                app.closeCardReview();
            }

            // 空格或回车翻转卡片
            if ((e.key === ' ' || e.key === 'Enter') && document.getElementById('cardReviewModal').classList.contains('active')) {
                e.preventDefault();
                app.flipCard();
            }

            // 左右箭头切换卡片
            if (document.getElementById('cardReviewModal').classList.contains('active')) {
                if (e.key === 'ArrowLeft') app.prevCard();
                if (e.key === 'ArrowRight') app.nextCard();
            }
        });

        // 检测是否为移动设备
        function isMobile() {
            return window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 移动端初始化
        MarkdownNotebookApp.prototype.initMobile = function() {
            if (!isMobile()) return;

            // 默认显示编辑器标签
            this.mobileCurrentTab = 'edit';
            this.updateMobileTabUI();

            // 监听窗口大小变化
            window.addEventListener('resize', () => {
                this.handleResize();
            });

            // 监听触摸手势
            this.initTouchGestures();
        };

        // 处理窗口大小变化
        MarkdownNotebookApp.prototype.handleResize = function() {
            const isMobileNow = isMobile();

            if (!isMobileNow) {
                // 切换到桌面端布局
                document.getElementById('editorPane').style.display = 'flex';
                document.getElementById('previewPane').style.display = 'flex';
                document.getElementById('mobileTabs').style.display = 'none';
                document.getElementById('mobileMenuBtn').style.display = 'none';
                document.getElementById('mobileNav').style.display = 'none';
                document.getElementById('sidebar').style.position = '';
                document.getElementById('sidebar').style.left = '';
                document.getElementById('sidebar').style.height = '';
            } else {
                this.updateMobileTabUI();
            }
        };

        // 切换移动端标签
        MarkdownNotebookApp.prototype.switchMobileTab = function(tab) {
            this.mobileCurrentTab = tab;
            this.updateMobileTabUI();
        };

        // 更新移动端标签 UI
        MarkdownNotebookApp.prototype.updateMobileTabUI = function() {
            if (!isMobile()) return;

            const editorPane = document.getElementById('editorPane');
            const previewPane = document.getElementById('previewPane');
            const editTab = document.getElementById('editTab');
            const previewTab = document.getElementById('previewTab');

            if (this.mobileCurrentTab === 'edit') {
                editorPane.style.display = 'flex';
                previewPane.style.display = 'none';
                editTab.classList.add('active');
                previewTab.classList.remove('active');
            } else {
                editorPane.style.display = 'none';
                previewPane.style.display = 'flex';
                editTab.classList.remove('active');
                previewTab.classList.add('active');
                this.updatePreview();
            }
        };

        // 切换移动端视图
        MarkdownNotebookApp.prototype.switchMobileView = function(view) {
            document.querySelectorAll('.mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('nav' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');

            const mobileTabs = document.getElementById('mobileTabs');

            if (view === 'notes') {
                if (mobileTabs) mobileTabs.classList.remove('hidden');
                if (scheduleApp) scheduleApp.switchToNotes();
                if (isMobile()) this.updateMobileTabUI();
            } else if (view === 'schedule') {
                if (mobileTabs) mobileTabs.classList.add('hidden');
                if (scheduleApp) scheduleApp.showSchedule();
            } else if (view === 'cards') {
                if (mobileTabs) mobileTabs.classList.add('hidden');
                if (scheduleApp) scheduleApp.switchToNotes();
                this.startCardReview();
            } else if (view === 'menu') {
                this.toggleSidebar();
            }
        };

        // 打开侧边栏
        MarkdownNotebookApp.prototype.openSidebar = function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        // 关闭侧边栏
        MarkdownNotebookApp.prototype.closeSidebar = function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.body.style.overflow = '';
        };

        // 切换侧边栏
        MarkdownNotebookApp.prototype.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {
                this.closeSidebar();
            } else {
                this.openSidebar();
            }
        };

        // 初始化触摸手势
        MarkdownNotebookApp.prototype.initTouchGestures = function() {
            let startX = 0;
            let startY = 0;

            document.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const diffX = startX - endX;
                const diffY = startY - endY;

                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                    if (document.getElementById('cardReviewModal').classList.contains('active')) {
                        if (diffX > 0) {
                            this.nextCard();
                        } else {
                            this.prevCard();
                        }
                    } else if (!document.getElementById('sidebar').classList.contains('open')) {
                        if (startX < 30 && diffX < 0) {
                            this.openSidebar();
                        }
                    }
                }
            }, { passive: true });
        };

        // 覆盖原有的 openNote 方法，添加移动端适配
        const originalOpenNote = MarkdownNotebookApp.prototype.openNote;
        MarkdownNotebookApp.prototype.openNote = function(notebookId, noteId) {
            originalOpenNote.call(this, notebookId, noteId);

            if (isMobile()) {
                this.closeSidebar();
                this.mobileCurrentTab = 'edit';
                this.updateMobileTabUI();
                document.querySelectorAll('.mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('navNotes').classList.add('active');
            }
        };

        // 初始化移动端
        app.initMobile();
    </script>
    <!-- 引入模板库 -->
    <script src="templates.js"></script>
    <script src="schedule.js"></script>
    <script src="ai-cards.js"></script>
</body>
</html>
